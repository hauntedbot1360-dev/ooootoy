<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Background Theme</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  /* ব্যাকগ্রাউন্ড ভিডিও */
  .bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }

  /* ভিডিওর উপর হালকা কালো ওভারলে, যাতে টেক্সট পড়তে সুবিধা হয় */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.45);
    z-index: -1;
  }

  /* এখন থেকে যা যা লিখবে সব এই ভিডিওর উপরেই দেখাবে */
  .content {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .content h1 {
    font-size: 2.5rem;
    margin-bottom: 12px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  .content p {
    font-size: 1.1rem;
    max-width: 600px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  .content button {
    margin-top: 24px;
    padding: 12px 28px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #ffffff;
    color: #000;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ব্যাকগ্রাউন্ড ভিডিও: এখানে নিজের লিংক বসাও -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/dm9eogzev/video/upload/v1781700939/filevault/file_fudryi.mp4">
</video>

<div class="overlay"></div>

<!-- এখানে তোমার ওয়েবসাইটের বাকি সব কন্টেন্ট লিখবে -->
<div class="content">
  <h1>তোমার ওয়েবসাইটের শিরোনাম</h1>
  <p>এখানে তোমার সাইটের বর্ণনা বা টেক্সট লিখবে। এই অংশটাই ভিডিওর উপর ভেসে থাকবে।</p>
  <button>একটা বাটন</button>
</div>

</body>
</html>
